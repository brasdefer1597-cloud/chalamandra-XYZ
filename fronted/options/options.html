<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container">
        <h1>Settings</h1>
        <div class="card">
            <label>Gemini API Key (Fallback)</label>
            <p class="desc">Used when On-Device AI is not available.</p>
            <input type="password" id="apiKey" placeholder="AIzaSy..." />
            <button id="save">Save Key</button>
            <div id="status" class="hidden">Saved!</div>
        </div>
    </div>
    <script src="options.js"></script>
</body>
</html>
